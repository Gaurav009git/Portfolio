    <!-- Preload critical assets -->
    <link rel="preload" href="/src/index.css" as="style" />
    <!-- <link rel="preload" href="/src/App.js" as="script" /> -->
    
    <!-- Inline critical CSS to prevent flash of unstyled content -->
    <style>
      /* Critical inline styles for initial render */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      :root {
        --bg-dark: #0F0F0F;
        --text-primary: #E8EAED;
      }
      
      html {
        scroll-behavior: smooth;
      }
      
      body {
        font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-primary);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Loading state styles */
      .app-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #0F0F0F;
      }
      
      .loading-spinner-main {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(66, 133, 244, 0.2);
        border-top: 3px solid #4285F4;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Smooth cursor transition */
      @media (min-width: 769px) {
        body {
          cursor: none;
        }
      }
      
      @media (max-width: 768px) {
        body {
          cursor: auto;
        }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #0F0F0F;
        color: #E8EAED;
        font-family: 'Inter', sans-serif;
        text-align: center;
        padding: 2rem;
      ">
        <div>
          <h1 style="font-size: 2rem; margin-bottom: 1rem;">JavaScript Required</h1>
          <p style="font-size: 1.2rem; color: #9AA0A6; margin-bottom: 1.5rem;">
            You need to enable JavaScript to run this portfolio application.
          </p>
          <p style="font-size: 1rem; color: #5F6368;">
            Please enable JavaScript in your browser settings and refresh the page.
          </p>
        </div>
      </div>
    </noscript>
    
    <!-- Root element for React -->
    <div id="root">
      <!-- Optional: Loading state while React initializes -->
      <div class="app-loading">
        <div class="loading-spinner-main"></div>
      </div>
    </div>
    
    <!-- React entry point -->
    <script type="module" src="/src/main.jsx"></script>
